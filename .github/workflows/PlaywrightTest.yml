name: Playwright Tests

on:
	#push:
	#	branches:
	#		- main
	#		- master
	#pull_request:
  #  branches:
  #    - main
  #    - master
  schedule:
  - cron: '0 13 * * *' # Runs daily at 13:00 UTC
	workflow_dispatch:

jobs:
	test:
		timeout-minutes: 60
		runs-on: windows-latest
		permissions:
			contents: write
		steps:
			- name: Checkout repository
				uses: actions/checkout@v4

			- name: Setup Node.js
				uses: actions/setup-node@v4
				with:
					node-version: 20
					cache: npm

			- name: Install dependencies
				run: npm ci

			- name: Install Playwright Chrome
				run: npx playwright install --with-deps chromium

			-name: Configure environment variables from secrets
			 run: |
			   echo "PRACTICE_USERNAME=${{ secrets.PRACTICE_USERNAME }}" >> $GITHUB_ENV
				 echo "PRACTICE_PASSWORD=${{ secrets.PRACTICE_PASSWORD }}" >> $GITHUB_ENV


			- name: Run Playwright tests
				run: npm run tests:headless

			- name: Upload Playwright report
				if: always()
				uses: actions/upload-artifact@v4
				with:
					name: playwright-report
					path: playwright-report/
					retention-days: 7
    
